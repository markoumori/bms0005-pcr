<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice MCQs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --border-color: #27272a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-exam: #10b981; /* Emerald Green */
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 2rem 6rem 2rem;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-header { width: 100%; max-width: 800px; margin-bottom: 1rem; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-link:hover { color: var(--text-main); }

        .container { max-width: 800px; width: 100%; position: relative; }

        .header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            color: var(--accent-exam);
            letter-spacing: -1px;
        }

        .header-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }

        /* --- Status Bar / Timer --- */
        .status-bar {
            position: sticky;
            top: 10px;
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-exam);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        .timer { font-family: 'Fira Code', monospace; font-size: 1.5rem; font-weight: 600; color: var(--accent-exam); }
        .timer.danger { color: var(--error); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- Question Cards --- */
        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .q-number { font-size: 0.85rem; color: var(--accent-exam); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .q-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; margin-top: 0; margin-bottom: 1.5rem; }

        .options-list { list-style: none; padding: 0; margin: 0; }
        
        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover { background: #1e1e24; border-color: #555; }
        
        input[type="radio"] { margin-right: 15px; accent-color: var(--accent-exam); transform: scale(1.2); }

        /* --- Feedback Styles --- */
        .option-label.correct { background: rgba(16, 185, 129, 0.1); border-color: var(--accent-exam); color: #a7f3d0; }
        .option-label.incorrect { background: rgba(239, 68, 68, 0.1); border-color: var(--error); color: #fca5a5; opacity: 0.7; }
        
        .explanation {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #111;
            border-left: 3px solid var(--accent-exam);
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* --- Buttons --- */
        .btn-primary {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-primary:hover { background-color: #e2e8f0; }

        /* --- Results Modal --- */
        #resultsScreen {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--accent-exam);
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .score-display { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; color: var(--accent-exam); font-weight: 800; line-height: 1; margin: 1rem 0; }

    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-link">← Return to Interface</a>
    </div>

    <div class="container">
        <h1 class="header-title">MCQ Practice</h1>
        <p class="header-desc">10 random questions. 10 minutes. 5 options per question. The clock starts when you press begin.</p>

        <div id="startScreen">
            <button class="btn-primary" onclick="startExam()">Initiate Evaluation</button>
        </div>

        <div id="examInterface" style="display: none;">
            <div class="status-bar">
                <span style="font-weight: 600; letter-spacing: 1px;">EVALUATION ACTIVE</span>
                <div class="timer" id="timerDisplay">10:00</div>
            </div>

            <div id="questionsContainer"></div>

            <button class="btn-primary" id="submitBtn" onclick="submitExam()">Submit Exam</button>
        </div>

        <div id="resultsScreen">
            <h2 style="margin-top:0; font-family: 'Space Grotesk', sans-serif;">Evaluation Complete</h2>
            <div class="score-display" id="finalScore">0/10</div>
            <p id="scoreMessage" style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem;">Review your answers below.</p>
            <button class="btn-primary" onclick="location.reload()">Generate New Exam</button>
        </div>

    </div>

    <script>
        // Master Question Pool (20 Questions - 10 pulled at random)
        const masterPool = [
            { q: "During PCR, what is the primary purpose of the Denaturation step (94-98°C)?", 
              options: ["To activate the Taq polymerase enzyme", "To separate the double-stranded DNA into single strands", "To allow primers to bind to the template", "To synthesize new DNA strands", "To degrade any contaminating RNA"], 
              ans: 1, 
              exp: "High heat breaks the hydrogen bonds between base pairs, separating the double helix into two single strands so primers can access the sequence." },
            
            { q: "Why is Taq polymerase essential for PCR rather than human DNA polymerase?", 
              options: ["It synthesizes DNA much faster", "It is resistant to the high temperatures used during denaturation", "It does not require primers to start synthesis", "It has a higher proofreading accuracy", "It only requires magnesium to function"], 
              ans: 1, 
              exp: "Taq is isolated from a thermophilic bacterium, allowing it to survive the 95°C denaturation step without being destroyed." },
            
            { q: "What primary factor dictates the optimal Annealing temperature for a PCR reaction?", 
              options: ["The concentration of Taq polymerase", "The desired length of the final PCR product", "The melting temperature (Tm) of the primers", "The amount of Template DNA added", "The buffer concentration"], 
              ans: 2, 
              exp: "Annealing temperature is typically set 3-5°C below the melting temperature of the primers to ensure specific binding." },
            
            { q: "Which of the following is NOT a required component of a standard PCR master mix?", 
              options: ["Taq Polymerase", "dNTPs (Nucleotides)", "Helicase", "Primers", "Magnesium Chloride (MgCl2)"], 
              ans: 2, 
              exp: "Helicase is used in living cells to unzip DNA. In PCR, we use heat (Denaturation) to separate the strands instead." },
            
            { q: "In Sanger sequencing, what causes the elongation of the DNA strand to terminate?", 
              options: ["Depletion of Taq polymerase", "Lowering the reaction temperature", "Incorporation of a dideoxynucleotide (ddNTP)", "Encountering a stop codon", "Addition of a restriction enzyme"], 
              ans: 2, 
              exp: "ddNTPs lack the 3'-OH group necessary for adding the next nucleotide, thereby terminating the chain." },
            
            { q: "Which of the following researchers did NOT win the Nobel Prize for the discovery of the DNA double helix?", 
              options: ["James Watson", "Francis Crick", "Maurice Wilkins", "Rosalind Franklin", "None of the above won the prize"], 
              ans: 3, 
              exp: "Rosalind Franklin passed away before the prize was awarded, and Nobel prizes are not awarded posthumously." },
            
            { q: "A point mutation that changes an amino acid-coding codon into a premature 'STOP' codon is classified as a:", 
              options: ["Missense mutation", "Silent mutation", "Nonsense mutation", "Frameshift mutation", "Deletion mutation"], 
              ans: 2, 
              exp: "Nonsense mutations result in a premature stop codon, usually leading to a truncated, non-functional protein." },
            
            { q: "If a DNA sequence reads 5'-ATGC-3', what is its complementary sequence?", 
              options: ["3'-ATGC-5'", "5'-TACG-3'", "3'-TACG-5'", "5'-GCAT-3'", "3'-GCAT-5'"], 
              ans: 2, 
              exp: "DNA is antiparallel. The complement to 5'-ATGC-3' is 3'-TACG-5'." },
            
            { q: "In the CRISPR-Cas9 system, what directs the Cas9 nuclease to the exact target sequence in the genome?", 
              options: ["The PAM sequence", "A guide RNA (gRNA)", "A forward primer", "A reverse transcriptase", "The donor DNA template"], 
              ans: 1, 
              exp: "The guide RNA is engineered to be complementary to the target DNA, leading the Cas9 enzyme to the correct cut site." },
            
            { q: "Which of the following databases would be most appropriate for finding the number of Exons in a human gene?", 
              options: ["NCBI PubMed", "NCBI Gene", "RCSB PDB (Protein Data Bank)", "BLASTp", "ClinVar"], 
              ans: 1, 
              exp: "NCBI Gene provides structural details of genes, including genomic context, exons, and transcript variants." },
            
            { q: "In gel electrophoresis, smaller DNA fragments migrate ________ than larger fragments.", 
              options: ["Slower", "Faster", "At the exact same speed", "Towards the negative electrode", "Perpendicularly"], 
              ans: 1, 
              exp: "The agarose gel acts as a sieve. Smaller molecules pass through the pores more easily and migrate faster/further." },
            
            { q: "Which chemical group is located at the 5' end of a DNA strand?", 
              options: ["Hydroxyl group", "Phosphate group", "Carboxyl group", "Amino group", "Methyl group"], 
              ans: 1, 
              exp: "The 5' end of a DNA strand terminates in a Phosphate group, while the 3' end terminates in a Hydroxyl (OH) group." },
            
            { q: "What is the function of Magnesium (MgCl2) in a PCR reaction?", 
              options: ["It acts as a buffer to stabilize pH", "It provides the building blocks for DNA", "It acts as an essential cofactor for Taq polymerase", "It stains the DNA for visualization", "It prevents primer-dimer formation"], 
              ans: 2, 
              exp: "Taq polymerase requires Magnesium ions as a cofactor to function properly." },
            
            { q: "Which technique is most commonly used to confirm the specific base-pair sequence of a PCR product?", 
              options: ["Gel Electrophoresis", "Sanger Sequencing", "Western Blotting", "Flow Cytometry", "Spectrophotometry"], 
              ans: 1, 
              exp: "While a gel confirms size, Sanger Sequencing is used to determine the exact order of A, C, G, and T bases." },
            
            { q: "Insertion or deletion of a single nucleotide within a gene typically causes a:", 
              options: ["Silent mutation", "Missense mutation", "Frameshift mutation", "Splice-site mutation", "Translocation"], 
              ans: 2, 
              exp: "Because DNA is read in triplets, adding or removing one base shifts the entire reading frame downstream of the mutation." },

            { q: "In standard nomenclature, what does 'cDNA' stand for?", 
              options: ["Cellular DNA", "Chromosomal DNA", "Complementary DNA", "Circular DNA", "Coding DNA"], 
              ans: 2, 
              exp: "Complementary DNA (cDNA) is synthesized from a single-stranded RNA template in a reaction catalyzed by the enzyme reverse transcriptase." },

            { q: "What role does the 'PAM' sequence play in CRISPR-Cas9 editing?", 
              options: ["It provides the RNA template", "It seals the DNA after cutting", "It is required for Cas9 to bind and cut the target DNA", "It transcribes the gRNA", "It is the repair template"], 
              ans: 2, 
              exp: "Cas9 will not cut the target DNA unless a specific Protospacer Adjacent Motif (PAM) is located immediately downstream of the target." },

            { q: "If the GC content of a primer increases, its Melting Temperature (Tm) will:", 
              options: ["Decrease", "Increase", "Remain exactly the same", "Fluctuate randomly", "Become zero"], 
              ans: 1, 
              exp: "G and C bases are bonded by three hydrogen bonds (compared to two for A and T), requiring more heat energy to separate." },

            { q: "The process of decoding mRNA to synthesize a protein is called:", 
              options: ["Transcription", "Translation", "Replication", "Transformation", "Transduction"], 
              ans: 1, 
              exp: "Translation is the process where ribosomes synthesize proteins using the mature mRNA transcript." },

            { q: "What is an 'amplicon'?", 
              options: ["The enzyme that copies DNA", "A machine used for PCR", "The specific piece of DNA produced by PCR", "The dye used in a gel", "A type of mutation"], 
              ans: 2, 
              exp: "An amplicon is a piece of DNA or RNA that is the source and/or product of amplification or replication events." }
        ];

        let currentExam = [];
        let timeLeft = 600; // 10 minutes
        let timerInterval;
        let isSubmitted = false;

        // Fisher-Yates Shuffle
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startExam() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('examInterface').style.display = 'block';
            
            // Generate 10 random questions
            let shuffledPool = shuffle([...masterPool]);
            currentExam = shuffledPool.slice(0, 10);
            
            renderQuestions();
            
            // Start Timer
            timerInterval = setInterval(updateTimer, 1000);
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            currentExam.forEach((qObj, index) => {
                let card = document.createElement('div');
                card.className = 'question-card';
                card.id = `qCard_${index}`;

                let html = `<span class="q-number">Question ${index + 1} of 10</span>
                            <p class="q-text">${qObj.q}</p>
                            <ul class="options-list">`;
                
                qObj.options.forEach((opt, optIndex) => {
                    html += `
                        <label class="option-label" id="label_${index}_${optIndex}">
                            <input type="radio" name="q_${index}" value="${optIndex}">
                            ${opt}
                        </label>`;
                });

                html += `</ul>
                         <div class="explanation" id="exp_${index}">
                            <strong>Review:</strong> ${qObj.exp}
                         </div>`;
                
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function updateTimer() {
            if (isSubmitted) return;
            
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            let display = document.getElementById('timerDisplay');
            
            display.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;

            if (timeLeft <= 60) {
                display.classList.add('danger');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitExam();
            }
        }

        function submitExam() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('timerDisplay').classList.remove('danger');
            
            let score = 0;

            currentExam.forEach((qObj, index) => {
                let selected = document.querySelector(`input[name="q_${index}"]:checked`);
                let expBox = document.getElementById(`exp_${index}`);
                
                // Highlight correct answer
                document.getElementById(`label_${index}_${qObj.ans}`).classList.add('correct');
                
                if (selected) {
                    let userAns = parseInt(selected.value);
                    if (userAns === qObj.ans) {
                        score++;
                    } else {
                        document.getElementById(`label_${index}_${userAns}`).classList.add('incorrect');
                    }
                }

                // Disable inputs and show explanation
                let radios = document.querySelectorAll(`input[name="q_${index}"]`);
                radios.forEach(r => r.disabled = true);
                expBox.style.display = 'block';
            });

            // Show Results Screen
            document.getElementById('resultsScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = `${score}/10`;
            
            let msg = document.getElementById('scoreMessage');
            if (score >= 8) msg.textContent = "Excellent work. You demonstrate a strong grasp of the material.";
            else if (score >= 5) msg.textContent = "Good effort. Review the explanations below to refine your knowledge.";
            else msg.textContent = "Review required. Please revisit the Theory & Archives modules.";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
